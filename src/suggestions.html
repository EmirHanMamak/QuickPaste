<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickPaste Suggestions</title>
  <link rel="stylesheet" href="./fonts.css">
  <link rel="stylesheet" href="./assets/tailwind.css">
  <style>
    :root {
      color-scheme: dark;
      --qp-bg: #12131a;
      --qp-surface: #1b1e29;
      --qp-border: #31364a;
      --qp-text: #e7e7ea;
      --qp-muted: #9aa0b4;
      --qp-primary: #4aa3ff;
      --qp-primary-soft: rgba(74, 163, 255, 0.14);
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      color: var(--qp-text);
      font-family: Inter, sans-serif;
      overflow: hidden;
    }
    body {
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 12%, rgba(74, 163, 255, 0.16), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(124, 58, 237, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(12, 14, 20, 0.98), rgba(8, 10, 15, 0.98));
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.05), transparent 42%);
    }
    body::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 24%),
        linear-gradient(0deg, rgba(0, 0, 0, 0.26), transparent 18%);
      opacity: 0.7;
    }
    .shell {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(20, 23, 32, 0.98), rgba(12, 14, 20, 0.98));
      border: 1px solid color-mix(in srgb, var(--qp-border) 88%, transparent);
      border-radius: 20px;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .search {
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--qp-surface) 94%, white 6%), color-mix(in srgb, var(--qp-surface) 88%, black));
      border: 1px solid color-mix(in srgb, var(--qp-border) 88%, transparent);
      color: var(--qp-text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .search:focus-visible,
    button:focus-visible {
      box-shadow: 0 0 0 3px var(--qp-focus-ring);
      outline: none;
    }
    .item {
      border: 1px solid rgba(255,255,255,0.06);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }
    .item:hover {
      transform: translateY(-1px);
      border-color: rgba(74, 163, 255, 0.38);
      background:
        linear-gradient(180deg, rgba(74, 163, 255, 0.10), rgba(74, 163, 255, 0.05));
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }
    .primary {
      color: var(--qp-primary);
      background: var(--qp-primary-soft);
      border: 1px solid rgba(74, 163, 255, 0.18);
    }
    .item:active {
      transform: translateY(0);
    }
    .item[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    @media (max-width: 360px) {
      .shell {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="px-3 pt-3 pb-2 border-b border-[var(--qp-border)]">
      <div class="text-[10px] uppercase tracking-[0.28em] text-[var(--qp-muted)]">QuickPaste</div>
      <div class="mt-1 text-sm font-semibold">Suggestions</div>
      <input id="filterInput" class="search mt-2 w-full rounded-xl px-3 py-2 text-sm" placeholder="Filter suggestions..." />
    </div>

    <div class="px-3 py-2 border-b border-[var(--qp-border)] text-xs text-[var(--qp-muted)]">
      <span id="queryLabel">Query:</span> <span id="queryValue" class="text-[var(--qp-text)]"></span>
    </div>

    <div id="list" class="flex-1 overflow-y-auto p-2 flex flex-col gap-2"></div>

    <div class="px-3 py-2 border-t border-[var(--qp-border)] text-[11px] text-[var(--qp-muted)]">
      Click a suggestion to expand it in the active app.
    </div>
  </div>

  <script src="./suggestions.js" type="module"></script>
</body>
</html>
